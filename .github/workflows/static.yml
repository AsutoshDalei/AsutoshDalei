# Deploy static site to GitHub Pages (Node 24–compatible actions)
name: Deploy static content to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Inject chat backend endpoint
        env:
          CHAT_API_ENDPOINT: ${{ vars.CHAT_API_ENDPOINT }}
        run: |
          if [ -z "$CHAT_API_ENDPOINT" ]; then
            echo "CHAT_API_ENDPOINT not set. Chat widget will stay disabled."
            exit 0
          fi

          python - <<'PY'
          import os
          from pathlib import Path

          chat_path = Path("assets/js/chat.js")
          placeholder = "__CHAT_API_ENDPOINT__"
          endpoint = os.environ["CHAT_API_ENDPOINT"]

          content = chat_path.read_text()
          if placeholder not in content:
            raise SystemExit(f"Placeholder {placeholder} not found in {chat_path}")

          chat_path.write_text(content.replace(placeholder, endpoint))
          print(f"Injected chat endpoint into {chat_path}")
          PY

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
